# Configuración Streamlit (tema corporativo + comportamiento público)

[theme]
base = "light"
primaryColor = "#1a3a5c"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f3f7"
textColor = "#222222"
font = "sans serif"

[server]
headless = true
runOnSave = false
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 10

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
toolbarMode = "minimal"
